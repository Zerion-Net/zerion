<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Zerion Network</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="container nav-content">
            <div class="logo" id="nav-logo">ZERION</div>
            <ul id="nav-links"></ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container hero-inner">
            <h1 id="hero-title"></h1>
            <p id="hero-desc"></p>
            <div id="hero-cta"></div>
        </div>
    </header>

    <div class="container">
        <div class="status-box">
            <div class="status-item">
                <span>IP Address</span>
                <strong id="server-ip">-</strong>
            </div>
            <div class="status-item">
                <span>Port</span>
                <strong id="server-port">-</strong>
            </div>
            <div class="status-item">
                <span>Status</span>
                <strong id="server-state" class="badge checking">Mengecek...</strong>
            </div>
            <div class="status-item">
                <span>Pemain</span>
                <strong id="server-players">- / -</strong>
            </div>
        </div>
    </div>

    <section id="store" class="container section">
        <h2 class="section-title">🛒 Web Store</h2>
        <p style="text-align:center; color:var(--text-dim); margin-bottom: 40px;">Beli item untuk mendukung server dan perkuat karaktermu!</p>
        <div class="grid" id="store-grid">
            </div>
    </section>

    <footer id="footer">
        <div class="container">
            <p id="footer-text"></p>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
                    </html>
